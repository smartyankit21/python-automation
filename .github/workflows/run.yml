name: Run Breakout Analysis Daily

on:
  schedule:
    - cron: '30 7 * * *'  # 1:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python script.py

      - name: Upload output CSV
        uses: actions/upload-artifact@v4
        with:
          name: breakout-analysis
          path: BreakoutAnalysis60D_*.csv
